name: Build

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libfftw3-dev \
            libsqlite3-dev \
            libzimg-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: gcc_64
          cache: true

      - name: Install VapourSynth headers
        run: |
          git clone https://github.com/vapoursynth/vapoursynth.git --depth 1
          sudo mkdir -p /usr/include/vapoursynth
          sudo cp vapoursynth/include/VapourSynth4.h vapoursynth/include/VSHelper4.h /usr/include/vapoursynth/
          sudo tee /usr/lib/pkgconfig/vapoursynth.pc > /dev/null << 'EOF'
          prefix=/usr
          includedir=${prefix}/include/vapoursynth
          libdir=${prefix}/lib

          Name: vapoursynth
          Description: VapourSynth
          Version: 74
          Cflags: -I${includedir}
          EOF
          rm -rf vapoursynth

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-linux-x86_64"
          mkdir "${BASE}"
          cp build/vsanalog.so "${BASE}/"
          tar --owner=0 --group=0 -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-linux-x86_64
          path: vsanalog-*.tar.xz

      - name: Build sdist
        run: pipx run build --sdist -o dist/
        env:
          PKG_CONFIG_PATH: ${{ env.QT_ROOT_DIR }}/lib/pkgconfig

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-sdist
          path: dist/*.tar.gz

      - name: Build manylinux wheel
        run: |
          mkdir -p wheelhouse
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/wheelhouse:/wheelhouse" \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -exc '
          PYBIN="/opt/python/cp312-cp312/bin"
          export PATH="${PYBIN}:${PATH}"

          dnf install -y fftw-devel sqlite-devel gcc-c++ pkg-config

          python3 -m pip install --quiet aqtinstall
          # Qt renamed the Linux desktop arch from gcc_64 to linux_gcc_64
          # after 6.2.x; 6.8.3 only exposes linux_gcc_64. aqt still drops
          # the linux_ prefix from the install dir, so QT_PREFIX is unchanged.
          python3 -m aqt install-qt linux desktop 6.8.3 linux_gcc_64 \
            --outputdir /opt/qt --archives qtbase icu
          QT_PREFIX="/opt/qt/6.8.3/gcc_64"
          export PATH="${QT_PREFIX}/bin:${PATH}"
          export PKG_CONFIG_PATH="${QT_PREFIX}/lib/pkgconfig"
          export LD_LIBRARY_PATH="${QT_PREFIX}/lib"

          mkdir -p /usr/include/vapoursynth
          curl -sSL https://raw.githubusercontent.com/vapoursynth/vapoursynth/master/include/VapourSynth4.h \
            -o /usr/include/vapoursynth/VapourSynth4.h
          curl -sSL https://raw.githubusercontent.com/vapoursynth/vapoursynth/master/include/VSHelper4.h \
            -o /usr/include/vapoursynth/VSHelper4.h
          cat > /usr/lib64/pkgconfig/vapoursynth.pc << VSPC
          prefix=/usr
          includedir=\${prefix}/include/vapoursynth
          libdir=\${prefix}/lib64

          Name: vapoursynth
          Description: VapourSynth
          Version: 74
          Cflags: -I\${includedir}
          VSPC

          python3 -m pip install --quiet 'meson!=1.11.0' ninja meson-python build auditwheel wheel

          cp -a /src /tmp/build
          cd /tmp/build
          python3 -m build --wheel --no-isolation -o /tmp/dist/
          auditwheel repair --plat manylinux_2_28_x86_64 -w /wheelhouse/ /tmp/dist/*.whl
          python3 -m wheel tags --python-tag py3 --abi-tag none /wheelhouse/*.whl --remove
          '

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-linux-x86_64
          path: wheelhouse/*.whl

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libfftw3-dev \
            libsqlite3-dev \
            libzimg-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: linux_gcc_arm64
          cache: true

      - name: Install VapourSynth headers
        run: |
          git clone https://github.com/vapoursynth/vapoursynth.git --depth 1
          sudo mkdir -p /usr/include/vapoursynth
          sudo cp vapoursynth/include/VapourSynth4.h vapoursynth/include/VSHelper4.h /usr/include/vapoursynth/
          sudo tee /usr/lib/pkgconfig/vapoursynth.pc > /dev/null << 'EOF'
          prefix=/usr
          includedir=${prefix}/include/vapoursynth
          libdir=${prefix}/lib

          Name: vapoursynth
          Description: VapourSynth
          Version: 74
          Cflags: -I${includedir}
          EOF
          rm -rf vapoursynth

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-linux-arm64"
          mkdir "${BASE}"
          cp build/vsanalog.so "${BASE}/"
          tar --owner=0 --group=0 -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-linux-arm64
          path: vsanalog-*.tar.xz

      - name: Build manylinux wheel
        run: |
          mkdir -p wheelhouse
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/wheelhouse:/wheelhouse" \
            quay.io/pypa/manylinux_2_34_aarch64 \
            bash -exc '
          PYBIN="/opt/python/cp312-cp312/bin"
          export PATH="${PYBIN}:${PATH}"

          dnf install -y fftw-devel sqlite-devel gcc-c++ pkg-config

          python3 -m pip install --quiet aqtinstall
          python3 -m aqt install-qt linux_arm64 desktop 6.7.3 linux_gcc_arm64 \
            --outputdir /opt/qt --archives qtbase icu
          QT_PREFIX="/opt/qt/6.7.3/gcc_arm64"
          export PATH="${QT_PREFIX}/bin:${PATH}"
          export PKG_CONFIG_PATH="${QT_PREFIX}/lib/pkgconfig"
          export LD_LIBRARY_PATH="${QT_PREFIX}/lib"

          mkdir -p /usr/include/vapoursynth
          curl -sSL https://raw.githubusercontent.com/vapoursynth/vapoursynth/master/include/VapourSynth4.h \
            -o /usr/include/vapoursynth/VapourSynth4.h
          curl -sSL https://raw.githubusercontent.com/vapoursynth/vapoursynth/master/include/VSHelper4.h \
            -o /usr/include/vapoursynth/VSHelper4.h
          cat > /usr/lib64/pkgconfig/vapoursynth.pc << VSPC
          prefix=/usr
          includedir=\${prefix}/include/vapoursynth
          libdir=\${prefix}/lib64

          Name: vapoursynth
          Description: VapourSynth
          Version: 74
          Cflags: -I\${includedir}
          VSPC

          python3 -m pip install --quiet 'meson!=1.11.0' ninja meson-python build auditwheel wheel

          cp -a /src /tmp/build
          cd /tmp/build
          python3 -m build --wheel --no-isolation -o /tmp/dist/
          auditwheel repair --plat manylinux_2_34_aarch64 -w /wheelhouse/ /tmp/dist/*.whl
          python3 -m wheel tags --python-tag py3 --abi-tag none /wheelhouse/*.whl --remove
          '

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-linux-arm64
          path: wheelhouse/*.whl

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install meson fftw sqlite vapoursynth

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: clang_64
          cache: true

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-macos-arm64"
          mkdir "${BASE}"
          cp build/vsanalog.dylib "${BASE}/"
          tar --uid 0 --gid 0 --exclude '.DS_Store' -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-macos-arm64
          path: vsanalog-*.tar.xz

      - name: Install Qt6 6.8.3 (for wheel bundling)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: clang_64
          cache: true

      - name: Build wheel
        run: |
          pip install delocate wheel
          pipx run build --wheel -o dist/
          DYLD_LIBRARY_PATH="${{ env.QT_ROOT_DIR }}/lib" \
            delocate-wheel -w wheelhouse/ dist/*.whl
          python -m wheel tags --python-tag py3 --abi-tag none wheelhouse/*.whl --remove
        env:
          PKG_CONFIG_PATH: ${{ env.QT_ROOT_DIR }}/lib/pkgconfig

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-macos-arm64
          path: wheelhouse/*.whl

  build-macos-x86_64:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install meson fftw sqlite vapoursynth

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: clang_64
          cache: true

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-macos-x86_64"
          mkdir "${BASE}"
          cp build/vsanalog.dylib "${BASE}/"
          tar --uid 0 --gid 0 --exclude '.DS_Store' -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-macos-x86_64
          path: vsanalog-*.tar.xz

      - name: Install Qt6 6.8.3 (for wheel bundling)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: clang_64
          cache: true

      - name: Build wheel
        run: |
          pip install delocate wheel
          pipx run build --wheel -o dist/
          DYLD_LIBRARY_PATH="${{ env.QT_ROOT_DIR }}/lib" \
            delocate-wheel -w wheelhouse/ dist/*.whl
          python -m wheel tags --python-tag py3 --abi-tag none wheelhouse/*.whl --remove
        env:
          PKG_CONFIG_PATH: ${{ env.QT_ROOT_DIR }}/lib/pkgconfig

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-macos-x86_64
          path: wheelhouse/*.whl

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Meson and Ninja
        run: pip install 'meson!=1.11.0' ninja

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: win64_msvc2019_64
          cache: true

      - name: Install pkg-config
        run: choco install pkgconfiglite --allow-empty-checksums

      - name: Install vcpkg dependencies
        run: |
          vcpkg integrate install
          vcpkg install fftw3:x64-windows sqlite3:x64-windows

      - name: Download VapourSynth SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/vapoursynth/vapoursynth/releases/download/R70/VapourSynth64-Portable-R70.zip" -OutFile vs.zip
          Expand-Archive vs.zip -DestinationPath vs_sdk

      - name: Create pkg-config files
        shell: pwsh
        run: |
          $pkgConfigDir = "pkgconfig"
          New-Item -ItemType Directory -Force -Path $pkgConfigDir

          # Convert backslashes to forward slashes for pkg-config compatibility
          $workspacePath = "${{ github.workspace }}".Replace('\', '/')

          # VapourSynth
          $vsContent = @"
          prefix=$workspacePath/vs_sdk
          includedir=`${prefix}/sdk/include/vapoursynth
          libdir=`${prefix}

          Name: vapoursynth
          Description: VapourSynth
          Version: 70
          Cflags: -I`${includedir}
          "@
          $vsContent | Out-File -FilePath "$pkgConfigDir/vapoursynth.pc" -Encoding ASCII -NoNewline

          # FFTW3
          $fftwContent = @"
          prefix=C:/vcpkg/installed/x64-windows
          exec_prefix=`${prefix}
          libdir=`${prefix}/lib
          includedir=`${prefix}/include

          Name: fftw3
          Description: FFTW3
          Version: 3.3.10
          Libs: -L`${libdir} -lfftw3
          Cflags: -I`${includedir}
          "@
          $fftwContent | Out-File -FilePath "$pkgConfigDir/fftw3.pc" -Encoding ASCII -NoNewline

          # SQLite3
          $sqliteContent = @"
          prefix=C:/vcpkg/installed/x64-windows
          exec_prefix=`${prefix}
          libdir=`${prefix}/lib
          includedir=`${prefix}/include

          Name: sqlite3
          Description: SQLite3
          Version: 3.45.0
          Libs: -L`${libdir} -lsqlite3
          Cflags: -I`${includedir}
          "@
          $sqliteContent | Out-File -FilePath "$pkgConfigDir/sqlite3.pc" -Encoding ASCII -NoNewline

      - name: Build
        shell: pwsh
        run: |
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}/pkgconfig;${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          $env:PATH = "${{ env.QT_ROOT_DIR }}/bin;$env:PATH"

          meson setup build --buildtype=release `
            --pkg-config-path="$env:PKG_CONFIG_PATH" `
            -Dcmake_prefix_path="${{ env.QT_ROOT_DIR }}"

          meson compile -C build

      - name: Package tarball
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path meson.build -Pattern "version\s*:\s*'([^']+)'" | Select-Object -First 1).Matches[0].Groups[1].Value
          $BASE = "vsanalog-${VERSION}-windows-x64"
          New-Item -ItemType Directory -Path $BASE | Out-Null
          Copy-Item build\vsanalog.dll "$BASE\"
          tar --uid 0 --gid 0 -cf "$BASE.tar" $BASE
          python -c "import lzma,sys; i=sys.argv[1]; open(i+'.xz','wb').write(lzma.compress(open(i,'rb').read(),format=lzma.FORMAT_XZ,preset=9|lzma.PRESET_EXTREME))" "$BASE.tar"
          Remove-Item "$BASE.tar"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-windows-x64
          path: vsanalog-*.tar.xz

      - name: Install Qt6 6.8.3 (for wheel bundling)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64
          cache: true

      - name: Build wheel
        shell: pwsh
        run: |
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}/pkgconfig;${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          $env:PATH = "${{ env.QT_ROOT_DIR }}/bin;$env:PATH"
          pip install delvewheel wheel
          pipx run build --wheel -o dist/
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          # vsanalog.dll lives outside any Python package this wheel owns, so
          # delvewheel needs --analyze-existing to inspect it; --namespace-pkg
          # keeps it from minting __init__.py files inside vapoursynth/.
          delvewheel repair --analyze-existing --namespace-pkg "vapoursynth;vapoursynth.plugins" --add-path "${{ env.QT_ROOT_DIR }}/bin;C:/vcpkg/installed/x64-windows/bin" $wheel -w wheelhouse/
          python -m wheel tags --python-tag py3 --abi-tag none (Get-ChildItem wheelhouse/*.whl) --remove

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-windows-x64
          path: wheelhouse/*.whl

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x86_64, build-linux-arm64, build-macos-arm64, build-macos-x86_64, build-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.xz
            artifacts/**/*.whl
            artifacts/**/*.tar.gz

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x86_64, build-linux-arm64, build-macos-arm64, build-macos-x86_64, build-windows-x64]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download sdist
        uses: actions/download-artifact@v6
        with:
          name: vsanalog-sdist
          path: dist/

      - name: Download wheels
        uses: actions/download-artifact@v6
        with:
          pattern: vsanalog-wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
