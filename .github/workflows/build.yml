name: Build

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libfftw3-dev \
            libsqlite3-dev \
            libzimg-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: gcc_64
          cache: true

      - name: Install VapourSynth
        run: |
          git clone https://github.com/vapoursynth/vapoursynth.git --depth 1
          pushd vapoursynth
          ./autogen.sh
          ./configure --prefix=/usr --disable-x86-asm --disable-vsscript --disable-vspipe --disable-python-module
          make -j$(nproc)
          sudo make install -j$(nproc)
          popd
          rm -rf vapoursynth

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-linux-x86_64"
          mkdir "${BASE}"
          cp build/vsanalog.so "${BASE}/"
          tar --owner=0 --group=0 -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-linux-x86_64
          path: vsanalog-*.tar.xz

      - name: Build wheel and sdist
        run: pipx run build --wheel --sdist -o dist/
        env:
          PKG_CONFIG_PATH: ${{ env.QT_ROOT_DIR }}/lib/pkgconfig

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-linux-x86_64
          path: dist/*.whl

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-sdist
          path: dist/*.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libfftw3-dev \
            libsqlite3-dev \
            libzimg-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: linux_gcc_arm64
          cache: true

      - name: Install VapourSynth
        run: |
          git clone https://github.com/vapoursynth/vapoursynth.git --depth 1
          pushd vapoursynth
          ./autogen.sh
          ./configure --prefix=/usr --disable-x86-asm --disable-vsscript --disable-vspipe --disable-python-module
          make -j$(nproc)
          sudo make install -j$(nproc)
          popd
          rm -rf vapoursynth

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-linux-arm64"
          mkdir "${BASE}"
          cp build/vsanalog.so "${BASE}/"
          tar --owner=0 --group=0 -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-linux-arm64
          path: vsanalog-*.tar.xz

      - name: Build wheel
        run: pipx run build --wheel -o dist/
        env:
          PKG_CONFIG_PATH: ${{ env.QT_ROOT_DIR }}/lib/pkgconfig

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-linux-arm64
          path: dist/*.whl

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install meson fftw sqlite vapoursynth

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: clang_64
          cache: true

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-macos-arm64"
          mkdir "${BASE}"
          cp build/vsanalog.dylib "${BASE}/"
          tar --uid 0 --gid 0 --exclude '.DS_Store' -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-macos-arm64
          path: vsanalog-*.tar.xz

      - name: Build wheel
        run: pipx run build --wheel -o dist/
        env:
          PKG_CONFIG_PATH: ${{ env.QT_ROOT_DIR }}/lib/pkgconfig

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-macos-arm64
          path: dist/*.whl

  build-macos-x86_64:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install meson fftw sqlite vapoursynth

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: clang_64
          cache: true

      - name: Build
        run: |
          meson setup build --buildtype=release \
            -Dpkg_config_path="${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          meson compile -C build

      - name: Package tarball
        run: |
          VERSION=$(sed -n "s/.*version *: *'\([^']*\)'.*/\1/p" meson.build | head -1)
          BASE="vsanalog-${VERSION}-macos-x86_64"
          mkdir "${BASE}"
          cp build/vsanalog.dylib "${BASE}/"
          tar --uid 0 --gid 0 --exclude '.DS_Store' -cf - "${BASE}" | xz -9 -e -T1 > "${BASE}.tar.xz"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-macos-x86_64
          path: vsanalog-*.tar.xz

      - name: Build wheel
        run: pipx run build --wheel -o dist/
        env:
          PKG_CONFIG_PATH: ${{ env.QT_ROOT_DIR }}/lib/pkgconfig

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-macos-x86_64
          path: dist/*.whl

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Meson and Ninja
        run: pip install meson ninja

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          arch: win64_msvc2019_64
          cache: true

      - name: Install pkg-config
        run: choco install pkgconfiglite --allow-empty-checksums

      - name: Install vcpkg dependencies
        run: |
          vcpkg integrate install
          vcpkg install fftw3:x64-windows sqlite3:x64-windows

      - name: Download VapourSynth SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/vapoursynth/vapoursynth/releases/download/R70/VapourSynth64-Portable-R70.zip" -OutFile vs.zip
          Expand-Archive vs.zip -DestinationPath vs_sdk

      - name: Create pkg-config files
        shell: pwsh
        run: |
          $pkgConfigDir = "pkgconfig"
          New-Item -ItemType Directory -Force -Path $pkgConfigDir

          # Convert backslashes to forward slashes for pkg-config compatibility
          $workspacePath = "${{ github.workspace }}".Replace('\', '/')

          # VapourSynth
          $vsContent = @"
          prefix=$workspacePath/vs_sdk
          includedir=`${prefix}/sdk/include/vapoursynth
          libdir=`${prefix}

          Name: vapoursynth
          Description: VapourSynth
          Version: 70
          Cflags: -I`${includedir}
          "@
          $vsContent | Out-File -FilePath "$pkgConfigDir/vapoursynth.pc" -Encoding ASCII -NoNewline

          # FFTW3
          $fftwContent = @"
          prefix=C:/vcpkg/installed/x64-windows
          exec_prefix=`${prefix}
          libdir=`${prefix}/lib
          includedir=`${prefix}/include

          Name: fftw3
          Description: FFTW3
          Version: 3.3.10
          Libs: -L`${libdir} -lfftw3
          Cflags: -I`${includedir}
          "@
          $fftwContent | Out-File -FilePath "$pkgConfigDir/fftw3.pc" -Encoding ASCII -NoNewline

          # SQLite3
          $sqliteContent = @"
          prefix=C:/vcpkg/installed/x64-windows
          exec_prefix=`${prefix}
          libdir=`${prefix}/lib
          includedir=`${prefix}/include

          Name: sqlite3
          Description: SQLite3
          Version: 3.45.0
          Libs: -L`${libdir} -lsqlite3
          Cflags: -I`${includedir}
          "@
          $sqliteContent | Out-File -FilePath "$pkgConfigDir/sqlite3.pc" -Encoding ASCII -NoNewline

      - name: Build
        shell: pwsh
        run: |
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}/pkgconfig;${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          $env:PATH = "${{ env.QT_ROOT_DIR }}/bin;$env:PATH"

          meson setup build --buildtype=release `
            --pkg-config-path="$env:PKG_CONFIG_PATH" `
            -Dcmake_prefix_path="${{ env.QT_ROOT_DIR }}"

          meson compile -C build

      - name: Package tarball
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path meson.build -Pattern "version\s*:\s*'([^']+)'" | Select-Object -First 1).Matches[0].Groups[1].Value
          $BASE = "vsanalog-${VERSION}-windows-x64"
          New-Item -ItemType Directory -Path $BASE | Out-Null
          Copy-Item build\vsanalog.dll "$BASE\"
          tar --uid 0 --gid 0 -cf "$BASE.tar" $BASE
          python -c "import lzma,sys; i=sys.argv[1]; open(i+'.xz','wb').write(lzma.compress(open(i,'rb').read(),format=lzma.FORMAT_XZ,preset=9|lzma.PRESET_EXTREME))" "$BASE.tar"
          Remove-Item "$BASE.tar"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-windows-x64
          path: vsanalog-*.tar.xz

      - name: Build wheel
        shell: pwsh
        run: |
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}/pkgconfig;${{ env.QT_ROOT_DIR }}/lib/pkgconfig"
          $env:PATH = "${{ env.QT_ROOT_DIR }}/bin;$env:PATH"
          pipx run build --wheel -o dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: vsanalog-wheel-windows-x64
          path: dist/*.whl

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x86_64, build-linux-arm64, build-macos-arm64, build-macos-x86_64, build-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.xz

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x86_64, build-linux-arm64, build-macos-arm64, build-macos-x86_64, build-windows-x64]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download sdist
        uses: actions/download-artifact@v6
        with:
          name: vsanalog-sdist
          path: dist/

      - name: Download wheels
        uses: actions/download-artifact@v6
        with:
          pattern: vsanalog-wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
